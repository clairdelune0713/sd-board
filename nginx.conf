server {
    listen 80;
    server_name localhost;

    # Maximum upload size (if applicable)
    client_max_body_size 10M;

    location / {
        # Forward requests to the sd-board container
        # If running Nginx in a separate docker container, use 'sd-board' as the hostname
        proxy_pass http://sd-board:8005;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for large image generation
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;

        # Disable buffering for large image responses to start streaming immediately
        proxy_buffering off;
    }

    # Optional: Health check path
    location /health {
        access_log off;
        return 200 'OK';
    }
}
